
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Mini Klon</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
        #crosshair {
            position: absolute; top:50%; left:50%;
            color:#fff; font-size:30px; font-weight:bold;
            transform:translate(-50%,-50%);
            pointer-events:none; user-select:none;
            text-shadow:0 0 3px #000;
        }
        #info {
            position: absolute; top:10px; left:10px; color:white;
            background:rgba(0,0,0,0.4); padding:8px 12px; border-radius:4px;
            pointer-events:none;
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="info">1=Çim  2=Toprak  3=Taş<br>Sol tık = Kır, Sağ tık = Koy</div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // ─── Temel Kurulum ───────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88CCFF);

        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias:true});
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        // Işık
        scene.add(new THREE.AmbientLight(0x404040, 1.4));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(20, 30, 15);
        scene.add(sun);

        // Malzemeler
        const materials = {
            grass: new THREE.MeshLambertMaterial({color: 0x4CAF50}),
            dirt:  new THREE.MeshLambertMaterial({color: 0x8B4513}),
            stone: new THREE.MeshLambertMaterial({color: 0x888888})
        };
        let selectedMaterial = materials.grass;

        // Bloklar (daha performanslı yönetim için array)
        const blocks = [];
        const geometry = new THREE.BoxGeometry(1,1,1);

        for(let x = -25; x <= 25; x++) {
            for(let z = -25; z <= 25; z++) {
                const block = new THREE.Mesh(geometry, materials.grass);
                block.position.set(x, -0.5, z);
                scene.add(block);
                blocks.push(block);
            }
        }

        camera.position.set(0, 2, 8);

        // ─── Input ────────────────────────────────────────────────
        const move = {f:false, b:false, l:false, r:false};
        let velocityY = 0;
        let canJump = true;

        document.addEventListener('keydown', e => {
            if (!controls.isLocked) return;
            switch(e.code) {
                case 'KeyW': move.f = true; break;
                case 'KeyS': move.b = true; break;
                case 'KeyA': move.l = true; break;
                case 'KeyD': move.r = true; break;
                case 'Space':
                    if (canJump) {
                        velocityY = 7;   // biraz daha güçlü zıplama
                        canJump = false;
                    }
                    break;
                case 'Digit1': selectedMaterial = materials.grass; break;
                case 'Digit2': selectedMaterial = materials.dirt;  break;
                case 'Digit3': selectedMaterial = materials.stone; break;
            }
        });

        document.addEventListener('keyup', e => {
            switch(e.code) {
                case 'KeyW': move.f = false; break;
                case 'KeyS': move.b = false; break;
                case 'KeyA': move.l = false; break;
                case 'KeyD': move.r = false; break;
            }
        });

        // ─── Fare Tıklama & Raycast ───────────────────────────────
        const raycaster = new THREE.Raycaster();
        document.addEventListener('contextmenu', e => e.preventDefault());

        document.addEventListener('mousedown', e => {
            if (!controls.isLocked) return;

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera); // merkezden (crosshair)
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0) {
                const hit = intersects[0];
                const block = hit.object;

                if (e.button === 0) { // SOL TIK → KIR
                    scene.remove(block);
                    const idx = blocks.indexOf(block);
                    if (idx !== -1) blocks.splice(idx, 1);
                }
                else if (e.button === 2) { // SAĞ TIK → KOY
                    const normal = hit.face.normal.clone();
                    const pos = block.position.clone().add(normal);

                    // Oyuncunun içine / çok yakına koymayı engelle
                    if (pos.distanceTo(camera.position) < 2.2) return;

                    const newBlock = new THREE.Mesh(geometry, selectedMaterial);
                    newBlock.position.copy(pos);
                    scene.add(newBlock);
                    blocks.push(newBlock);
                }
            }
        });

        // ─── Oyun Döngüsü ─────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                const speed = 6.5 * delta;

                if (move.f) controls.moveForward(speed);
                if (move.b) controls.moveForward(-speed);
                if (move.l) controls.moveRight(-speed);
                if (move.r) controls.moveRight(speed);

                // Yerçekimi + zıplama
                velocityY -= 18 * delta;           // biraz daha gerçekçi ivme
                camera.position.y += velocityY * delta;

                // Basit zemin çarpışması (ileride raycast ile geliştir)
                if (camera.position.y < 1.6) {
                    camera.position.y = 1.6;
                    velocityY = 0;
                    canJump = true;
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>
</html>
